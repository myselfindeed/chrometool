<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用Web元素数据采集器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #4285F4, #34A853);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 32px;
        }

        .features {
            text-align: left;
            margin-bottom: 32px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .feature-icon {
            font-size: 20px;
            margin-right: 12px;
            width: 24px;
        }

        .start-btn {
            background: white;
            color: #4285F4;
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="logo">🎯</div>
        <h1>欢迎使用Web元素数据采集器</h1>
        <p class="subtitle">快速从网页中提取指定元素内容，导出为结构化Excel文件</p>

        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">🎯</span>
                <span>智能元素选取 - 鼠标点击即可选择要采集的元素</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📊</span>
                <span>多内容类型 - 支持文本、链接、图片等多种内容</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📋</span>
                <span>拖拽排序 - 自由调整元素采集顺序</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📥</span>
                <span>Excel导出 - 一键导出为标准Excel文件</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">⚡</span>
                <span>高效便捷 - 简化数据采集工作流程</span>
            </div>
        </div>

        <button class="start-btn" onclick="startUsing()">开始使用</button>
    </div>

    <script>
        function startUsing() {
            // 关闭当前标签页
            chrome.tabs.getCurrent((tab) => {
                chrome.tabs.remove(tab.id);
            });
        }
    </script>
</body>
</html>
